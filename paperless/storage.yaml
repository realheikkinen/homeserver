# Consume-Ordner: statische PV/PVC gegen einen bereits bestehenden NFS-Export
# (analog jellyfin-media-pv, siehe jellyfin_setup.md) -- kein dynamisches Provisioning,
# weil der nfs-nas-Provisioner Unterverzeichnisse unter /data/bulk/k3s-pvc anlegt, nicht am
# festen Pfad /data/bulk/paperless-consume.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-consume-pv
spec:
  capacity:
    storage: 1700Gi        # entspricht der Größe von /data/bulk, nur Kapazitäts-Anzeige, kein Limit
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: nas-01
    path: /data/bulk/paperless-consume
  mountOptions:
    - nfsvers=4.1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume
  namespace: paperless
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: paperless-consume-pv
  resources:
    requests:
      storage: 1700Gi
---
# Dokumente (Originale/Archiv) -- klein im Vergleich zu Jellyfin/Immich, daher Longhorn statt NFS
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-media
  namespace: paperless
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
# Suchindex, Klassifikations-Modell, Thumbnails
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-data
  namespace: paperless
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
